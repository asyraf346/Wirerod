<!DOCTYPE html>
<html>
<head>
  <title>Wirerod LIVE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 15px; max-width: 500px; margin:auto; }
    h2 { text-align:center; }
    .box { border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:10px; }
    select, input, button { width:100%; padding:10px; margin-top:5px; }
    button { cursor:pointer; }
    .btn { display:flex; gap:10px; }
    .btn button { flex:1; }
  </style>
</head>
<body>

<h2>WIREROD LIVE STOCK</h2>

<div class="box">
  <h3>Stok Semasa</h3>
  <div id="stock"></div>
</div>

<div class="box">
  <h3>Kemaskini</h3>

  <select id="size">
    <option>R5.5</option>
    <option>R6.5</option>
    <option>R7.0</option>
    <option>R8.0</option>
    <option>R8.5</option>
    <option>R9.0</option>
    <option>R9.5</option>
    <option>R10</option>
    <option>R11</option>
    <option>R13</option>
  </select>

  <input type="number" id="qty" placeholder="Jumlah coil">

  <div class="btn">
    <button onclick="add()">+ Masuk</button>
    <button onclick="remove()">- Guna</button>
  </div>
</div>

<div class="box">
  <h3>History</h3>
  <div id="history"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 PASTE CONFIG FIREBASE ANDA DI SINI */
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const sizes = ["R5.5","R6.5","R7.0","R8.0","R8.5","R9.0","R9.5","R10","R11","R13"];

const stockRef = doc(db, "wirerod", "stock");
const historyRef = doc(db, "wirerod", "history");

/* INIT DATA */
async function init(){
  const s = await getDoc(stockRef);
  if(!s.exists()){
    let data = {};
    sizes.forEach(x => data[x]=0);
    await setDoc(stockRef, data);
    await setDoc(historyRef, {list:[]});
  }
}
init();

/* LIVE LISTENER */
onSnapshot(stockRef, (docSnap)=>{
  let data = docSnap.data() || {};
  document.getElementById("stock").innerHTML =
    sizes.map(s => `<div>${s} : <b>${data[s]||0}</b></div>`).join("");
});

/* HISTORY LISTENER */
onSnapshot(historyRef, (docSnap)=>{
  let data = docSnap.data() || {list:[]};
  let h = data.list || [];
  document.getElementById("history").innerHTML =
    h.slice().reverse().map(x =>
      `<div>${x.date} - ${x.type} ${x.size} (${x.qty})</div>`
    ).join("");
});

/* UPDATE STOCK */
window.add = async function(){
  let size = document.getElementById("size").value;
  let qty = parseInt(document.getElementById("qty").value);
  if(!qty) return;

  const snap = await getDoc(stockRef);
  let data = snap.data();

  data[size] = (data[size] || 0) + qty;

  await setDoc(stockRef, data);

  await updateDoc(historyRef, {
    list: arrayUnion({
      type:"Masuk",
      size,
      qty,
      date:new Date().toLocaleString()
    })
  });
}

/* REMOVE STOCK */
window.remove = async function(){
  let size = document.getElementById("size").value;
  let qty = parseInt(document.getElementById("qty").value);
  if(!qty) return;

  const snap = await getDoc(stockRef);
  let data = snap.data();

  if((data[size]||0) < qty){
    alert("Stok tak cukup");
    return;
  }

  data[size] -= qty;

  await setDoc(stockRef, data);

  await updateDoc(historyRef, {
    list: arrayUnion({
      type:"Guna",
      size,
      qty,
      date:new Date().toLocaleString()
    })
  });
}
</script>

</body>
</html>
